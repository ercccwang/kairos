<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📅 KAIROS</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: {
                display: ['Space Grotesk', 'sans-serif'],
                body: ['Noto Sans SC', 'Space Grotesk', 'sans-serif'],
            }}}
        }
    </script>
    <style>
        :root {
            --bg: #060606; --card: #0b0b0b; --card-up: #111111;
            --border: #1a1a1a; --fg: #e8e8e8; --muted: #555;
            --accent: #00ff88; --accent-dim: #00cc6a;
            --accent-bg: rgba(0,255,136,0.04); --accent-border: rgba(0,255,136,0.18);
            --accent-glow: rgba(0,255,136,0.12);
            --booked: #ff6b35; --booked-bg: rgba(255,107,53,0.05);
            --booked-border: rgba(255,107,53,0.18);
            --special: #888; --special-bg: rgba(255,255,255,0.015);
            --special-border: rgba(255,255,255,0.1);
            --special-glow: rgba(255,255,255,0.04);
            --special-hover-border: #444;
            --grid-line: rgba(255,255,255,0.018);
            --time-label: #3a3a3a; --occ-default: #1e1e1e; --occ-hover: #ccc;
            --watermark-color: #444; --footer-color: #2a2a2a;
            --placeholder: #3a3a3a;
            --glow-top: rgba(0,255,136,0.06); --glow-bottom: rgba(0,255,136,0.025);
            --particle-r: 0; --particle-g: 255; --particle-b: 136;
        }
        [data-theme="light"] {
            --bg: #f5f5f5; --card: #ffffff; --card-up: #ffffff;
            --border: #e2e2e2; --fg: #1a1a1a; --muted: #888;
            --accent: #00a85a; --accent-dim: #008f4d;
            --accent-bg: rgba(0,168,90,0.06); --accent-border: rgba(0,168,90,0.2);
            --accent-glow: rgba(0,168,90,0.1);
            --booked: #d04a15; --booked-bg: rgba(208,74,21,0.06);
            --booked-border: rgba(208,74,21,0.18);
            --special: #666; --special-bg: rgba(0,0,0,0.025);
            --special-border: rgba(0,0,0,0.1);
            --special-glow: rgba(0,0,0,0.04);
            --special-hover-border: #999;
            --grid-line: rgba(0,0,0,0.05);
            --time-label: #aaa; --occ-default: #ccc; --occ-hover: #555;
            --watermark-color: #bbb; --footer-color: #bbb;
            --placeholder: #bbb;
            --glow-top: rgba(0,168,90,0.04); --glow-bottom: rgba(0,168,90,0.015);
            --particle-r: 0; --particle-g: 140; --particle-b: 70;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Space Grotesk', sans-serif;
            background: var(--bg); color: var(--fg);
            min-height: 100vh; overflow-x: hidden;
            transition: background-color 0.35s ease, color 0.35s ease;
        }
        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 64px 64px;
            pointer-events: none; z-index: 0;
        }
        .top-glow {
            position: fixed; top: -260px; left: 50%; transform: translateX(-50%);
            width: 900px; height: 560px;
            background: radial-gradient(ellipse, var(--glow-top) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        .bottom-glow {
            position: fixed; bottom: -300px; left: 50%; transform: translateX(-50%);
            width: 700px; height: 400px;
            background: radial-gradient(ellipse, var(--glow-bottom) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }
        #particleCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        #themeToggle {
            position: fixed; top: 1.2rem; right: 1.2rem; z-index: 50;
            width: 40px; height: 40px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--card);
            color: var(--muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; transition: all 0.25s ease;
        }
        #themeToggle:hover {
            border-color: var(--accent-border); color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .brand {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: clamp(2.8rem, 6vw, 4rem);
            letter-spacing: 0.18em; color: var(--fg);
            position: relative; display: inline-block;
            transition: color 0.35s ease;
        }
        .brand-line-track {
            position: absolute; bottom: -6px; left: 0;
            width: 100%; height: 1px;
            background: rgba(0,255,136,0.06);
            overflow: hidden; border-radius: 1px;
        }
        .brand-line-bar {
            position: absolute; top: 0; left: -60%;
            width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: slideLine 3s ease-in-out infinite;
        }
        @keyframes slideLine { 0% { left: -60%; } 100% { left: 100%; } }
        .time-cell {
            height: 46px; display: flex; align-items: center; justify-content: center;
            border: 1px solid var(--border); border-radius: 6px;
            font-size: 0.8rem; transition: all 0.25s ease;
            cursor: default; position: relative; user-select: none;
        }
        .time-cell.available {
            border-color: var(--accent-border); background: var(--accent-bg);
            color: var(--accent); cursor: pointer; font-weight: 500;
            animation: cellPulse 3.5s ease-in-out infinite;
        }
        .time-cell.available:hover {
            border-color: var(--accent); background: rgba(0,255,136,0.09);
            box-shadow: 0 0 24px var(--accent-glow), inset 0 0 16px rgba(0,255,136,0.03);
            transform: translateY(-1px); animation: none;
        }
        .time-cell.available:active { transform: translateY(0) scale(0.98); }
        .time-cell.occupied {
            background: var(--special-bg); color: var(--occ-default);
            font-size: 0.75rem; cursor: pointer;
        }
        .time-cell.occupied .occ-hover { display: none; }
        .time-cell.occupied:hover {
            border-color: var(--special-border);
            background: var(--special-bg);
            box-shadow: 0 0 16px var(--special-glow);
            transform: translateY(-1px);
        }
        .time-cell.occupied:hover .occ-default { display: none; }
        .time-cell.occupied:hover .occ-hover { display: inline; color: var(--occ-hover); }
        .time-cell.occupied:active { transform: translateY(0) scale(0.98); }
        .time-cell.booked {
            border-color: var(--booked-border); background: var(--booked-bg);
            color: var(--booked); font-size: 0.72rem; font-weight: 400;
        }
        @keyframes cellPulse {
            0%, 100% { box-shadow: 0 0 0 0 transparent; }
            50% { box-shadow: 0 0 14px rgba(0,255,136,0.08); }
        }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.65);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease; padding: 1rem;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box {
            background: var(--card-up); border: 1px solid var(--border);
            border-radius: 16px; padding: 2rem; width: 100%; max-width: 440px;
            transform: translateY(24px) scale(0.96);
            transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), background 0.35s ease, border-color 0.35s ease;
        }
        .modal-overlay.active .modal-box { transform: translateY(0) scale(1); }
        .form-input {
            width: 100%; background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.75rem 1rem; color: var(--fg);
            font-size: 0.9rem; outline: none;
            transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.35s ease, color 0.35s ease;
            font-family: inherit;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        .form-input::placeholder { color: var(--placeholder); }
        .submit-btn {
            width: 100%; padding: 0.85rem; background: var(--accent); color: #000;
            border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
            cursor: pointer; transition: all 0.25s ease; font-family: inherit; letter-spacing: 0.03em;
        }
        .submit-btn:hover { background: var(--accent-dim); box-shadow: 0 0 32px var(--accent-glow); }
        .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
        .submit-btn.special-btn {
            background: transparent; color: var(--special);
            border: 1px solid var(--special-border);
        }
        .submit-btn.special-btn:hover {
            background: var(--special-bg); box-shadow: 0 0 24px var(--special-glow);
            color: var(--fg); border-color: var(--special-hover-border);
        }
        .special-notice {
            padding: 0.65rem 0.9rem; border-radius: 8px;
            background: var(--special-bg);
            border: 1px solid var(--special-border);
            color: var(--muted); font-size: 0.78rem;
            line-height: 1.5; display: flex; align-items: flex-start; gap: 0.5rem;
            transition: background 0.35s ease, border-color 0.35s ease;
        }
        .special-notice i { margin-top: 2px; color: var(--special); flex-shrink: 0; }
        .toast-container {
            position: fixed; top: 1.5rem; right: 1.5rem;
            z-index: 200; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .toast-item {
            padding: 0.9rem 1.4rem; border-radius: 10px; font-size: 0.85rem;
            max-width: 380px; transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), opacity 0.3s ease;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .toast-item.show { transform: translateX(0); }
        .toast-item.hide { transform: translateX(120%); opacity: 0; }
        .toast-item.success { background: rgba(0,255,136,0.1); border: 1px solid var(--accent-border); color: var(--accent); }
        .toast-item.error { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.25); color: #ff5050; }
        .day-tab {
            padding: 0.55rem 1.1rem; border: 1px solid var(--border); border-radius: 8px;
            background: transparent; color: var(--muted); font-size: 0.82rem;
            cursor: pointer; transition: all 0.25s ease; font-family: inherit;
            white-space: nowrap; flex-shrink: 0;
        }
        .day-tab:hover { border-color: var(--special-border); color: var(--fg); }
        .day-tab.active { border-color: var(--accent-border); background: var(--accent-bg); color: var(--accent); }
        .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
        .desk-grid { display: grid; grid-template-columns: 64px repeat(3, 1fr); gap: 5px; }
        .desk-header {
            text-align: center; padding: 0.7rem 0.3rem; font-size: 0.85rem;
            font-weight: 500; color: var(--fg);
            border-bottom: 1px solid var(--border); margin-bottom: 2px;
            transition: color 0.35s ease, border-color 0.35s ease;
        }
        .desk-time-label {
            display: flex; align-items: center; justify-content: flex-end;
            padding-right: 0.6rem; font-size: 0.72rem;
            color: var(--time-label); font-family: 'Space Grotesk', monospace;
            transition: color 0.35s ease;
        }
        .mobile-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1rem; height: 46px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 0.8rem; transition: all 0.25s ease; cursor: default;
        }
        .mobile-row.available {
            border-color: var(--accent-border); background: var(--accent-bg);
            cursor: pointer; animation: cellPulse 3.5s ease-in-out infinite;
        }
        .mobile-row.available:hover {
            border-color: var(--accent); background: rgba(0,255,136,0.09);
            box-shadow: 0 0 24px var(--accent-glow); animation: none;
        }
        .mobile-row.occupied { background: var(--special-bg); cursor: pointer; }
        .mobile-row.occupied:hover {
            border-color: var(--special-border);
            box-shadow: 0 0 16px var(--special-glow);
        }
        .mobile-row.booked { border-color: var(--booked-border); background: var(--booked-bg); }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-in { animation: fadeInUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards; opacity: 0; }
        .anim-delay-1 { animation-delay: 0.1s; }
        .anim-delay-2 { animation-delay: 0.25s; }
        .anim-delay-3 { animation-delay: 0.4s; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .watermark {
            position: fixed; bottom: 0.8rem; left: 50%; transform: translateX(-50%);
            font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem;
            font-weight: 400; letter-spacing: 0.18em; color: var(--watermark-color);
            user-select: none; pointer-events: none; z-index: 5; white-space: nowrap;
            transition: color 0.35s ease;
        }
        @media (prefers-reduced-motion: reduce) {
            .time-cell.available, .mobile-row.available { animation: none; }
            .brand-line-bar { animation: none; left: 0; }
            body { transition: none !important; }
            * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; }
        }
        @media (max-width: 767px) { .time-cell { height: 42px; } }
        @media (max-width: 520px) {
            .watermark { font-size: 0.58rem; letter-spacing: 0.08em; bottom: 0.5rem; }
        }
    </style>
</head>
<body class="font-body">

    <div class="grid-bg" aria-hidden="true"></div>
    <div class="top-glow" aria-hidden="true"></div>
    <div class="bottom-glow" aria-hidden="true"></div>
    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <button id="themeToggle" aria-label="切换主题"><i class="fas fa-sun"></i></button>
    <div class="watermark" aria-hidden="true">KAIROS &mdash; THE RIGHT MOMENT, by Runhong WANG</div>

    <main class="relative z-10 min-h-screen flex flex-col items-center px-4 pt-16 pb-12">
        <header class="text-center mb-14 anim-in">
            <h1 class="brand">
                KAIROS
                <span class="brand-line-track" aria-hidden="true"><span class="brand-line-bar"></span></span>
            </h1>
            <p class="mt-5 text-sm tracking-wide" style="color: var(--muted);">
                <span style="color: var(--accent);">*</span>仅展示未来三天可预约的时间。
            </p>
        </header>

        <section id="desktopView" class="hidden md:block w-full max-w-3xl anim-in anim-delay-1" aria-label="可预约时间表"></section>
        <section id="mobileView" class="md:hidden w-full max-w-md anim-in anim-delay-1" aria-label="可预约时间表"></section>

        <div class="mt-10 flex flex-wrap items-center justify-center gap-x-7 gap-y-3 text-xs anim-in anim-delay-2" style="color: var(--muted);">
            <div class="flex items-center gap-2">
                <div class="legend-dot" style="background: var(--accent); box-shadow: 0 0 6px var(--accent-glow);"></div>
                <span>可预约</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="legend-dot" style="background: var(--booked);"></div>
                <span>已预约</span>
            </div>
            <div class="flex items-center gap-2">
                <div class="legend-dot" style="background: #333; border: 1px solid #444;"></div>
                <span>已占用（可特殊申请）</span>
            </div>
        </div>

        <div class="mt-auto"></div>
    </main>

    <div id="modalOverlay" class="modal-overlay" role="dialog" aria-modal="true" aria-label="预约表单">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-5">
                <h2 id="modalTitle" class="text-base font-semibold" style="color: var(--fg); letter-spacing: 0.02em;">预约时间</h2>
                <button id="closeModalBtn" aria-label="关闭弹窗"
                    style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:1.1rem; padding:4px 6px; border-radius:4px; transition: color 0.2s;"
                    onmouseover="this.style.color='var(--fg)'" onmouseout="this.style.color='var(--muted)'">
                    <i class="fas fa-xmark"></i>
                </button>
            </div>
            <div id="timeDisplayBox" class="mb-4 p-3 rounded-lg flex items-center gap-2.5" style="background: var(--accent-bg); border: 1px solid var(--accent-border); transition: background 0.3s, border-color 0.3s;">
                <i id="timeDisplayIcon" class="fas fa-calendar-check text-sm" style="color: var(--accent);"></i>
                <span id="selectedTimeDisplay" style="color: var(--accent); font-size: 0.88rem; font-weight: 500;"></span>
            </div>
            <div id="specialNotice" class="special-notice mb-4" style="display:none;">
                <i class="fas fa-info-circle"></i>
                <span>该时段当前已被占用，提交后将被视为<strong style="color:var(--special);">特殊申请</strong>，需等待人工确认。</span>
            </div>
            <form id="bookingForm" onsubmit="return false;" novalidate>
                <div class="space-y-4">
                    <div>
                        <label for="inputName" class="block text-xs mb-1.5" style="color: var(--muted);">你的名字 <span style="color:#444">*</span></label>
                        <input id="inputName" type="text" class="form-input" placeholder="请输入你的名字" required autocomplete="name">
                    </div>
                    <div>
                        <label for="inputEmail" class="block text-xs mb-1.5" style="color: var(--muted);">邮箱地址 <span style="color:#444">*</span></label>
                        <input id="inputEmail" type="email" class="form-input" placeholder="your@email.com" required autocomplete="email">
                    </div>
                    <div>
                        <label for="inputMsg" class="block text-xs mb-1.5" style="color: var(--muted);">留言（选填）</label>
                        <textarea id="inputMsg" class="form-input" rows="3" placeholder="有什么想提前说的..."></textarea>
                    </div>
                </div>
                <button id="submitBtn" type="button" class="submit-btn mt-6">确认预约</button>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite"></div>

    <script>
    const EMAILJS_SERVICE_ID   = 'service_y7bulrw';
    const EMAILJS_PUBLIC_KEY   = 'ZuxC4UldSktCB9wMy';
    const EMAILJS_TEMPLATE_ID  = 'template_xf5oq3r';
    const RECIPIENT_EMAIL      = 'ericwang.muc@gmail.com';

    const FIREBASE_CONFIG = {
        apiKey: "", authDomain: "", databaseURL: "",
        projectId: "", storageBucket: "",
        messagingSenderId: "", appId: ""
    };

    let selectedSlot   = null;
    let locallyBooked  = new Set();
    let mobileDayIdx   = 0;
    let firebaseReady  = false;
    let particleRGB    = { r: 0, g: 255, b: 136 };

    const START_HOUR = 9;
    const END_HOUR   = 21;
    const WEEKDAYS   = ['周日','周一','周二','周三','周四','周五','周六'];

    /* === 主题 === */
    function initTheme() {
        const saved = localStorage.getItem('kairos-theme');
        if (saved) document.documentElement.setAttribute('data-theme', saved);
        updateThemeIcon();
        readParticleColor();
    }
    function toggleTheme() {
        const cur = document.documentElement.getAttribute('data-theme') || 'dark';
        const next = cur === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('kairos-theme', next);
        updateThemeIcon();
        readParticleColor();
    }
    function updateThemeIcon() {
        const isDark = (document.documentElement.getAttribute('data-theme') || 'dark') === 'dark';
        document.querySelector('#themeToggle i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
    }
    function readParticleColor() {
        const s = getComputedStyle(document.documentElement);
        particleRGB.r = parseInt(s.getPropertyValue('--particle-r')) || 0;
        particleRGB.g = parseInt(s.getPropertyValue('--particle-g')) || 255;
        particleRGB.b = parseInt(s.getPropertyValue('--particle-b')) || 136;
    }
    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    /* === Firebase === */
    function initFirebase() {
        if (typeof firebase === 'undefined') return;
        if (!FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.databaseURL) return;
        try {
            firebase.initializeApp(FIREBASE_CONFIG);
            const db = firebase.database();
            db.ref('bookedSlots').on('value', (snapshot) => {
                const data = snapshot.val();
                locallyBooked.clear();
                if (data) Object.keys(data).forEach(k => locallyBooked.add(k));
                renderDesktop();
                renderMobile();
            });
            firebaseReady = true;
            console.log('Firebase 实时同步已连接');
        } catch (e) {
            console.warn('Firebase 初始化失败，跳过同步:', e.message);
        }
    }

    /* === 日期与日程 — 7月19/20/21日 === */
    function getScheduleDates() {
        return [19, 20, 21].map(d => {
            const dt = new Date(2025, 6, d);
            return {
                date: dt,
                label: `7月${d}日`,
                weekday: WEEKDAYS[dt.getDay()],
                key: `2025-07-${String(d).padStart(2, '0')}`
            };
        });
    }

    function buildAvailability() {
        return {
            '2025-07-19': { available: [[13, 14], [19, 20]], booked: [] },
            '2025-07-20': { available: [[13, 14], [19, 20]], booked: [] },
            '2025-07-21': { available: [[17, 18], [19, 20]], booked: [] }
        };
    }

    function slotStatus(dateKey, hour, config) {
        const day = config[dateKey];
        if (!day) return 'occupied';
        for (const [s, e] of day.booked)    { if (hour >= s && hour < e) return 'booked'; }
        for (const [s, e] of day.available) { if (hour >= s && hour < e) return 'available'; }
        return 'occupied';
    }

    /* === 桌面端渲染 === */
    function renderDesktop() {
        const dates = getScheduleDates(), config = buildAvailability();
        const el = document.getElementById('desktopView');
        let h = '<div class="desk-grid"><div></div>';
        dates.forEach(d => {
            h += `<div class="desk-header">${d.label}<br><span style="color:var(--muted);font-size:0.72rem;font-weight:400;">${d.weekday}</span></div>`;
        });
        for (let hr = START_HOUR; hr < END_HOUR; hr++) {
            const ts = String(hr).padStart(2, '0') + ':00';
            h += `<div class="desk-time-label">${ts}</div>`;
            dates.forEach(d => {
                const k = d.key + '-' + hr;
                let st = slotStatus(d.key, hr, config);
                if (locallyBooked.has(k)) st = 'booked';
                if (st === 'available') {
                    h += `<div class="time-cell available" tabindex="0" role="button" aria-label="${d.label} ${ts} 可预约" onclick="handleCellClick('${d.key}',${hr},'${d.label}','${d.weekday}','normal')" onkeydown="if(event.key==='Enter')handleCellClick('${d.key}',${hr},'${d.label}','${d.weekday}','normal')">可预约</div>`;
                } else if (st === 'booked') {
                    h += `<div class="time-cell booked"><i class="fas fa-lock" style="margin-right:4px;font-size:0.6rem;opacity:0.7;"></i>已预约</div>`;
                } else {
                    h += `<div class="time-cell occupied" tabindex="0" role="button" aria-label="${d.label} ${ts} 可特殊申请" onclick="handleCellClick('${d.key}',${hr},'${d.label}','${d.weekday}','special')" onkeydown="if(event.key==='Enter')handleCellClick('${d.key}',${hr},'${d.label}','${d.weekday}','special')"><span class="occ-default">已占用</span><span class="occ-hover">可特殊申请</span></div>`;
                }
            });
        }
        h += '</div>';
        el.innerHTML = h;
    }

    /* === 移动端渲染 === */
    function renderMobile() {
        const dates = getScheduleDates(), config = buildAvailability();
        const el = document.getElementById('mobileView');
        let h = '<div class="flex gap-2 mb-4 overflow-x-auto pb-1" style="-webkit-overflow-scrolling:touch;">';
        dates.forEach((d, i) => {
            h += `<button class="day-tab${i === mobileDayIdx ? ' active' : ''}" onclick="switchDay(${i})" aria-pressed="${i === mobileDayIdx}">${d.label} ${d.weekday}</button>`;
        });
        h += '</div>';
        const d = dates[mobileDayIdx];
        h += '<div class="flex flex-col gap-1.5">';
        for (let hr = START_HOUR; hr < END_HOUR; hr++) {
            const ts = String(hr).padStart(2, '0') + ':00';
            const te = String(hr + 1).padStart(2, '0') + ':00';
            const k = d.key + '-' + hr;
            let st = slotStatus(d.key, hr, config);
            if (locallyBooked.has(k)) st = 'booked';
            const tc = st === 'available' ? 'var(--muted)' : st === 'booked' ? '#553322' : 'var(--occ-default)';
            const tl = `<span style="font-family:'Space Grotesk',monospace;font-size:0.78rem;color:${tc}">${ts} – ${te}</span>`;
            if (st === 'available') {
                h += `<div class="mobile-row available" tabindex="0" role="button" onclick="handleCellClick('${d.key}',${hr},'${d.label}','${d.weekday}','normal')" onkeydown="if(event.key==='Enter')handleCellClick('${d.key}',${hr},'${d.label}','${d.weekday}','normal')">${tl}<span style="color:var(--accent);font-weight:500;font-size:0.8rem;">可预约</span></div>`;
            } else if (st === 'booked') {
                h += `<div class="mobile-row booked">${tl}<span style="color:var(--booked);font-size:0.75rem;"><i class="fas fa-lock" style="margin-right:3px;font-size:0.6rem;opacity:0.7;"></i>已预约</span></div>`;
            } else {
                h += `<div class="mobile-row occupied" tabindex="0" role="button" onclick="handleCellClick('${d.key}',${hr},'${d.label}','${d.weekday}','special')" onkeydown="if(event.key==='Enter')handleCellClick('${d.key}',${hr},'${d.label}','${d.weekday}','special')">${tl}<span style="color:var(--occ-default);font-size:0.75rem;">已占用</span></div>`;
            }
        }
        h += '</div>';
        el.innerHTML = h;
    }

    function switchDay(i) { mobileDayIdx = i; renderMobile(); }

    /* === 弹窗 === */
    function handleCellClick(dateKey, hour, dateLabel, weekday, type) {
        openModal(dateKey, hour, dateLabel, weekday, type);
    }

    function openModal(dateKey, hour, dateLabel, weekday, type) {
        const ts = String(hour).padStart(2, '0') + ':00';
        const te = String(hour + 1).padStart(2, '0') + ':00';
        selectedSlot = { dateKey, hour, dateLabel, weekday, timeRange: ts + ' – ' + te, type };

        const isSp = type === 'special';
        document.getElementById('modalTitle').textContent = isSp ? '特殊申请' : '预约时间';

        const box = document.getElementById('timeDisplayBox');
        const icon = document.getElementById('timeDisplayIcon');
        const txt  = document.getElementById('selectedTimeDisplay');

        if (isSp) {
            box.style.background = 'var(--special-bg)';
            box.style.borderColor = 'var(--special-border)';
            icon.className = 'fas fa-exclamation-triangle text-sm';
            icon.style.color = 'var(--special)';
            txt.style.color = 'var(--special)';
        } else {
            box.style.background = 'var(--accent-bg)';
            box.style.borderColor = 'var(--accent-border)';
            icon.className = 'fas fa-calendar-check text-sm';
            icon.style.color = 'var(--accent)';
            txt.style.color = 'var(--accent)';
        }
        txt.textContent = dateLabel + ' ' + weekday + '  ' + ts + ' – ' + te;

        document.getElementById('specialNotice').style.display = isSp ? 'flex' : 'none';

        const btn = document.getElementById('submitBtn');
        btn.className = isSp ? 'submit-btn special-btn mt-6' : 'submit-btn mt-6';
        btn.textContent = isSp ? '提交特殊申请' : '确认预约';
        btn.disabled = false;

        document.getElementById('inputName').value = '';
        document.getElementById('inputEmail').value = '';
        document.getElementById('inputMsg').value = '';
        document.getElementById('modalOverlay').classList.add('active');
        setTimeout(() => document.getElementById('inputName').focus(), 120);
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('active');
        selectedSlot = null;
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    /* === 提交 === */
    document.getElementById('submitBtn').addEventListener('click', async function() {
        const name  = document.getElementById('inputName').value.trim();
        const email = document.getElementById('inputEmail').value.trim();
        const msg   = document.getElementById('inputMsg').value.trim();

        if (!name) { showToast('请输入你的名字', 'error'); document.getElementById('inputName').focus(); return; }
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showToast('请输入有效的邮箱地址', 'error'); document.getElementById('inputEmail').focus(); return;
        }
        if (!selectedSlot) return;

        const btn = this;
        btn.disabled = true;
        btn.textContent = '发送中...';

        const isSp = selectedSlot.type === 'special';
        const fullMessage =
            '申请类型：' + (isSp ? '特殊申请' : '普通预约') + '\n' +
            '预约日期：' + selectedSlot.dateLabel + ' ' + selectedSlot.weekday + '\n' +
            '预约时段：' + selectedSlot.timeRange + '\n' +
            '留言：' + (msg || '无');

        try {
            await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                from_name:  name,
                from_email: email,
                to_email:   RECIPIENT_EMAIL,
                to_name:    'KAIROS',
                reply_to:   email,
                message:    fullMessage
            });

            const slotKey = selectedSlot.dateKey + '-' + selectedSlot.hour;
            locallyBooked.add(slotKey);
            renderDesktop();
            renderMobile();
            closeModal();
            showToast(isSp ? '特殊申请已提交，等待人工确认' : '预约请求已发送，等待确认', 'success');

            if (firebaseReady) {
                firebase.database().ref('bookedSlots/' + slotKey).set({
                    name: name, email: email,
                    time: selectedSlot.timeRange,
                    date: selectedSlot.dateLabel + ' ' + selectedSlot.weekday,
                    type: isSp ? '特殊申请' : '普通预约',
                    message: msg || '无',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                }).catch(err => console.warn('Firebase 同步失败:', err));
            }
        } catch (err) {
            console.error('发送失败:', err);
            showToast('发送失败：' + (err.text || err.message || '未知错误'), 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = isSp ? '提交特殊申请' : '确认预约';
        }
    });

    /* === Toast === */
    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const el = document.createElement('div');
        el.className = 'toast-item ' + type;
        el.innerHTML = `<i class="fas ${type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation'}"></i><span>${message}</span>`;
        container.appendChild(el);
        requestAnimationFrame(() => el.classList.add('show'));
        setTimeout(() => {
            el.classList.remove('show'); el.classList.add('hide');
            setTimeout(() => el.remove(), 400);
        }, 4500);
    }

    /* === 粒子 === */
    function initParticles() {
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        resize();
        window.addEventListener('resize', resize);
        const COUNT = 45;
        const pts = [];
        for (let i = 0; i < COUNT; i++) {
            pts.push({
                x: Math.random()*W, y: Math.random()*H,
                r: Math.random()*1.2+0.4,
                dx: (Math.random()-0.5)*0.25, dy: (Math.random()-0.5)*0.25,
                o: Math.random()*0.25+0.05
            });
        }
        let mx = -1000, my = -1000;
        document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
        function frame() {
            ctx.clearRect(0, 0, W, H);
            const { r: pr, g: pg, b: pb } = particleRGB;
            for (const p of pts) {
                const ddx = p.x - mx, ddy = p.y - my, dist = Math.sqrt(ddx*ddx + ddy*ddy);
                if (dist < 120 && dist > 0) {
                    const f = (120 - dist) / 120 * 0.15;
                    p.x += (ddx / dist) * f; p.y += (ddy / dist) * f;
                }
                p.x += p.dx; p.y += p.dy;
                if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
                if (p.y < -10) p.y = H + 10; if (p.y > H + 10) p.y = -10;
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.max(0.1, p.r), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${pr},${pg},${pb},${p.o})`;
                ctx.fill();
            }
            for (let i = 0; i < COUNT; i++) {
                for (let j = i + 1; j < COUNT; j++) {
                    const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
                    const d = Math.sqrt(dx * dx + dy * dy);
                    if (d < 140) {
                        ctx.beginPath();
                        ctx.moveTo(pts[i].x, pts[i].y);
                        ctx.lineTo(pts[j].x, pts[j].y);
                        ctx.strokeStyle = `rgba(${pr},${pg},${pb},${0.03 * (1 - d / 140)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(frame);
        }
        frame();
    }

    /* === 启动 === */
    (function init() {
        emailjs.init(EMAILJS_PUBLIC_KEY);
        initTheme();
        initFirebase();
        renderDesktop();
        renderMobile();
        initParticles();
    })();
    </script>
</body>
